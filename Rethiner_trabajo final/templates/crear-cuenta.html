<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Crear Cuenta | Rethiner</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/rethiner-alert.css') }}">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Montserrat',sans-serif;
    }

    body{

      min-height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;

      background:
      linear-gradient(
      135deg,
      #0f172a,
      #1e3a8a,
      #2563eb
      );

      overflow:auto;

      padding:30px 15px;

    }

    .bg-blur{

      position:absolute;

      width:450px;
      height:450px;

      background:rgba(255,255,255,0.08);

      border-radius:50%;

      filter:blur(100px);

    }

    .bg1{
      top:-100px;
      left:-100px;
    }

    .bg2{
      bottom:-120px;
      right:-100px;
    }

    .register-container{

      position:relative;

      width:100%;
      max-width:420px;

      padding:35px;

      border-radius:24px;

      background:rgba(255,255,255,0.12);

      backdrop-filter:blur(18px);

      border:1px solid rgba(255,255,255,0.18);

      box-shadow:
      0 20px 60px rgba(0,0,0,0.35);

      color:white;

      z-index:2;

    }

    .logo{

      display:flex;
      align-items:center;
      gap:12px;

      margin-bottom:25px;

    }

    .logo-circle{

      width:42px;
      height:42px;

      border-radius:50%;

      border:3px solid white;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:18px;
      font-weight:700;

    }

    .logo h1{

      font-size:34px;
      font-weight:800;

    }

    .title{

      font-size:28px;
      font-weight:800;

      margin-bottom:10px;

    }

    .subtitle{

      opacity:0.8;

      margin-bottom:25px;

      line-height:1.5;

      font-size:14px;

    }

    .form-group{

      margin-bottom:18px;

    }

    .form-group label{

      display:block;

      margin-bottom:8px;

      font-size:13px;
      font-weight:600;

    }

    .form-group input{

      width:100%;

      padding:14px 16px;

      border:none;
      outline:none;

      border-radius:12px;

      background:rgba(255,255,255,0.14);

      color:white;

      font-size:14px;

    }

    .form-group input::placeholder{

      color:rgba(255,255,255,0.65);

    }

    .id-row{

      display:flex;
      gap:10px;

    }

    .id-row select{

      flex:0 0 88px;

      padding:14px 10px;

      border:none;
      outline:none;

      border-radius:12px;

      background:rgba(255,255,255,0.14);

      color:white;

      font-size:14px;
      font-weight:600;

      cursor:pointer;

    }

    .id-row select option{

      color:#0f172a;

    }

    .id-row input{

      flex:1;

    }

    .register-btn{

      width:100%;

      padding:14px;

      border:none;

      border-radius:12px;

      background:white;

      color:#1e3a8a;

      font-size:15px;
      font-weight:700;

      cursor:pointer;

      transition:0.3s;

      margin-top:8px;

    }

    .register-btn:hover{

      transform:translateY(-2px);

      background:#e2e8f0;

    }

    .login-link{

      margin-top:22px;

      text-align:center;

      font-size:14px;

      line-height:1.6;

    }

    .login-link a{

      color:white;

      font-weight:700;

      text-decoration:none;

    }

    .back-home{

      position:absolute;

      top:25px;
      left:25px;

      color:white;

      text-decoration:none;

      font-weight:600;

      z-index:3;

      font-size:14px;

    }

  </style>

</head>

<body>

  <a href="/" class="back-home">
    ← Volver al inicio
  </a>

  <div class="bg-blur bg1"></div>
  <div class="bg-blur bg2"></div>

  <div class="register-container">

    <div class="logo">

      <div class="logo-circle">
        ◉
      </div>

      <h1>Rethiner</h1>

    </div>

    <h2 class="title">
      Crear Cuenta
    </h2>

    <p class="subtitle">
      Regístrate para gestionar tus citas visuales y acceder a nuestros servicios.
    </p>

    <div class="form-group">

      <label>Nombre completo</label>

      <input
        type="text"
        id="nombre"
        placeholder="Tu nombre completo"
      >

    </div>

    <div class="form-group">

      <label>Documento de identidad</label>

      <div class="id-row">

        <select id="tipo-identificacion">
          <option value="">Tipo</option>
          <option value="CC">CC</option>
          <option value="TI">TI</option>
        </select>

        <input
          type="text"
          id="identificacion"
          placeholder="Número de documento"
          inputmode="numeric"
          maxlength="15"
        >

      </div>

    </div>

    <div class="form-group">

      <label>Correo electrónico</label>

      <input
        type="email"
        id="email"
        placeholder="tu@email.com"
      >

    </div>

    <div class="form-group">

      <label>Contraseña</label>

      <input
        type="password"
        id="password"
        placeholder="Crea una contraseña"
      >

    </div>

    <button
      class="register-btn"
      onclick="crearCuenta()"
    >
      Crear Cuenta
    </button>

    <div class="login-link">

      ¿Ya tienes una cuenta?<br>

      <a href="/login">
        Iniciar Sesión
      </a>

    </div>

  </div>

  <script src="{{ url_for('static', filename='js/rethiner-alert.js') }}"></script>

  <script>

    async function crearCuenta(){

      const nombre = document.getElementById("nombre").value.trim();
      const tipo_identificacion = document.getElementById("tipo-identificacion").value;
      const identificacion = document.getElementById("identificacion").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!tipo_identificacion) {
        await rethinerAlert("Selecciona el tipo de documento (CC o TI).", "warning");
        return;
      }

      if (!identificacion) {
        await rethinerAlert("Ingresa tu número de identificación.", "warning");
        return;
      }

      const res = await fetch("/registro", {

        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          nombre,
          tipo_identificacion,
          identificacion,
          email,
          password
        })

      });

      const data = await res.json();

      if (data.status === "ok") {
        await RethinerAlert.show({
          title: "¡Cuenta creada!",
          text: "Tu cuenta fue registrada correctamente. Ya puedes iniciar sesión.",
          type: "success"
        });
        window.location.href = "/login";
      } else {
        await RethinerAlert.show({
          title: "No se pudo registrar",
          text: data.mensaje || "Revisa los datos e intenta de nuevo.",
          type: "error"
        });
      }

    }

  </script>

</body>
</html>
