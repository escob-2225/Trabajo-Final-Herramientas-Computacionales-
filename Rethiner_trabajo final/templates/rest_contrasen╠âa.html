<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña – Rethiner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="reset-container">
    <h1>Restablecer Contraseña</h1>
    <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>

    <form id="recuperarForm">
      <input type="email" id="email" placeholder="Ingresa tu correo" required>

      <p id="mensaje" style="display:none; margin-top:15px; font-weight:bold;"></p>

      <button type="submit" class="btn-enviar">Enviar Enlace</button>
    </form>

    <div class="back-login">
      <a href="login.html">Volver al inicio de sesión</a>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById('recuperarForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('mensaje');
      msg.style.display = 'none';

      const email = document.getElementById('email').value;

      try {
        const data = await apiPost('/api/recuperar', { email });
        mostrarExito(msg, '✔ ' + data.message);
      } catch (err) {
        mostrarError(msg, err.message);
      }
    });
  </script>
</body>
</html>
