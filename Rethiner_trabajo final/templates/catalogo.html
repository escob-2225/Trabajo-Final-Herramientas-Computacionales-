<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo Rethiner</title>

    <link rel="stylesheet" href="/static/css/catalogo.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="catalogo-navbar">

        <a href="/" class="logo-link">

            <div class="logo-container">

                <!-- LOGO -->

                <img 
                    src="/static/img/logo.png"
                    class="logo-img"
                >

                <div class="logo-textos">

                    <h1>RETHINER</h1>

                    <p>Óptica y Oftalmología</p>

                </div>

            </div>

        </a>

        <div class="navbar-right">

            <a href="/" class="nav-link">
                Inicio
            </a>

        </div>

    </nav>

    <!-- HERO -->

    <section class="catalogo-hero">

        <div class="hero-overlay">

            <h2>Descubre Tu Nuevo Estilo</h2>

            <p>
                Elegancia, comodidad y tecnología visual en un solo lugar.
            </p>

        </div>

    </section>

    <!-- TITULO -->

    <section class="titulo-catalogo">

        <h2>Nuestras Categorías</h2>

    </section>

    <!-- GRID -->

    <section class="products-grid">

        <!-- MUJER -->

        <div class="product-card">

            <div class="product-img">

                <img src="/static/img/mujer.jpg">

            </div>

            <div class="product-name">

                <h2>Gafas Mujer</h2>

                <a href="/catalogo/mujer">

                    <button class="btn-explorar">
                        Ver Modelos
                    </button>

                </a>

            </div>

        </div>

        <!-- HOMBRE -->

        <div class="product-card">

            <div class="product-img">

                <img src="/static/img/hombre.jpg">

            </div>

            <div class="product-name">

                <h2>Gafas Hombre</h2>

                <a href="/catalogo/hombre">

                    <button class="btn-explorar">
                        Ver Modelos
                    </button>

                </a>

            </div>

        </div>

        <!-- SOL -->

        <div class="product-card">

            <div class="product-img">

                <img src="/static/img/sol.jpg">

            </div>

            <div class="product-name">

                <h2>Lentes de Sol</h2>

                <a href="/catalogo/sol">

                    <button class="btn-explorar">
                        Ver Modelos
                    </button>

                </a>

            </div>

        </div>

        <!-- MARCOS -->

        <div class="product-card">

            <div class="product-img">

                <img src="/static/img/marcos.jpg">

            </div>

            <div class="product-name">

                <h2>Marcos</h2>

                <a href="/catalogo/marcos">

                    <button class="btn-explorar">
                        Ver Modelos
                    </button>

                </a>

            </div>

        </div>

        <!-- CONTACTO -->

        <div class="product-card">

            <div class="product-img">

                <img src="/static/img/contacto.jpg">

            </div>

            <div class="product-name">

                <h2>Lentes de Contacto</h2>

                <a href="/catalogo/contacto">

                    <button class="btn-explorar">
                        Ver Modelos
                    </button>

                </a>

            </div>

        </div>

    </section>

</body>

</html>
